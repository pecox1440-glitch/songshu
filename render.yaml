services:
  - type: web
    name: songshu-assistant
    runtime: node
    plan: free
    buildCommand: npm install -g pnpm@9.15.9 && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /healthz
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: HOST
        value: 0.0.0.0
      - key: OPENAI_BASE_URL
        value: https://maylily.xyz/v1
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: ACCESS_USERNAME
        value: songshu
      - key: ACCESS_PASSWORD
        sync: false
